#########################################################################################
# Plane-wave analytic test: model 3 (sin(kx)*(sin(ky)+sin(kz)))
#########################################################################################

[setup]
GridRes         = 32
BoxLength       = 100.0
zstart          = 50.0
LPTorder        = 3
DoBaryons       = no
ParticleLoad    = sc

[cosmology]
ParameterSet    = Planck2018EE+BAO+SN
transfer        = eisenstein
ZeroRadiation   = true

[random]
generator       = NGENIC
seed            = 12345

[execution]
NumThreads      = 1

[output]
format          = generic
filename        = plane_wave_model3_output.hdf5

[testing]
test            = plane_wave

[testing_plane_wave]
model                  = 3
mode_x                 = 1
phi_amplitude          = 1.0
diagnostic_filename    = plane_wave_model3_diag.hdf5
